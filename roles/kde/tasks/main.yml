---
# KDE Plasma desktop environment

- name: Install KDE Plasma
  when: kde_state == 'present'
  become: true
  block:
    - name: Install KDE packages (full)
      when: not kde_minimal
      community.general.pacman:
        name: "{{ kde_packages_full }}"
        state: present

    - name: Install KDE packages (minimal)
      when: kde_minimal
      community.general.pacman:
        name: "{{ kde_packages_minimal }}"
        state: present

    - name: Install KDE applications
      when: kde_applications | length > 0
      community.general.pacman:
        name: "{{ kde_applications }}"
        state: present

    - name: Enable SDDM display manager
      ansible.builtin.systemd_service:
        name: sddm.service
        enabled: true

- name: Remove KDE Plasma
  when: kde_state == 'absent'
  become: true
  block:
    - name: Disable SDDM display manager
      ansible.builtin.systemd_service:
        name: sddm.service
        enabled: false
        state: stopped
      failed_when: false

    - name: Remove KDE applications
      when: kde_applications | length > 0
      community.general.pacman:
        name: "{{ kde_applications }}"
        state: absent
      failed_when: false

    - name: Remove KDE packages
      community.general.pacman:
        name: "{{ kde_packages_full + kde_packages_minimal }}"
        state: absent
      failed_when: false
