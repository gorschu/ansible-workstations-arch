---
# Snapper role defaults - BTRFS snapshot management

# Snapper state: present or absent
snapper_state: present

# Expected snapshots subvolume mount point
# Must be a separate subvolume at btrfs root level (sibling to @, not nested)
# This enables clean disaster recovery from archiso
snapper_snapshots_mount: "/.snapshots"

# Cleanup configuration - keep it minimal to avoid BTRFS bloat
snapper_config:
  # Timeline snapshots (hourly automatic) - disabled, we only want pacman snapshots
  TIMELINE_CREATE: "no"
  TIMELINE_LIMIT_HOURLY: "0"
  TIMELINE_LIMIT_DAILY: "3"
  TIMELINE_LIMIT_WEEKLY: "0"
  TIMELINE_LIMIT_MONTHLY: "0"
  TIMELINE_LIMIT_YEARLY: "0"

  # Number-based cleanup (snap-pac pre/post pacman snapshots)
  NUMBER_CLEANUP: "yes"
  NUMBER_LIMIT: "5"
  NUMBER_LIMIT_IMPORTANT: "3"

  # Comparison metadata
  SYNC_ACL: "yes"
  BACKGROUND_COMPARISON: "yes"

# Packages
packages_snapper:
  - snapper
  - snap-pac
