---
# Niri Wayland compositor with optional DankMaterialShell

- name: Install Niri
  when: niri_state == 'present'
  block:
    - name: Install Niri core packages
      become: true
      community.general.pacman:
        name: "{{ niri_core_packages }}"
        state: present

    - name: Install Niri AUR packages
      become: true
      become_user: aur_builder
      kewlfft.aur.aur:
        name: "{{ niri_core_packages_aur }}"
        state: present

    - name: Install traditional shell components
      when: not niri_use_dms
      become: true
      community.general.pacman:
        name: "{{ niri_traditional_packages }}"
        state: present

    - name: Install DankMaterialShell
      when: niri_use_dms
      block:
        - name: Install DMS from AUR
          become: true
          become_user: aur_builder
          kewlfft.aur.aur:
            name: "{{ niri_dms_package }}"
            state: present

        - name: Remove traditional shell components (using DMS)
          become: true
          community.general.pacman:
            name: "{{ niri_traditional_packages }}"
            state: absent
          failed_when: false

- name: Remove Niri
  when: niri_state == 'absent'
  block:
    - name: Remove DMS
      become: true
      become_user: aur_builder
      kewlfft.aur.aur:
        name: "{{ niri_dms_package }}"
        state: absent
      failed_when: false

    - name: Remove traditional shell components
      become: true
      community.general.pacman:
        name: "{{ niri_traditional_packages }}"
        state: absent
      failed_when: false

    - name: Remove Niri AUR packages
      become: true
      become_user: aur_builder
      kewlfft.aur.aur:
        name: "{{ niri_core_packages_aur }}"
        state: absent
      failed_when: false

    - name: Remove Niri core packages
      become: true
      community.general.pacman:
        name: "{{ niri_core_packages }}"
        state: absent
      failed_when: false
