---
# zrepl - ZFS snapshot and replication daemon (from chaotic-aur)

- name: Install zrepl
  when:
    - zfs_state == 'present'
    - zrepl_state == 'present'
  become: true
  block:
    - name: Install zrepl from chaotic-aur
      community.general.pacman:
        name: zrepl-git
        state: present

    - name: Ensure /etc/zrepl exists
      ansible.builtin.file:
        path: /etc/zrepl
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Deploy zrepl configuration
      ansible.builtin.template:
        src: zrepl.yml.j2
        dest: /etc/zrepl/zrepl.yml
        mode: "0644"
      notify: Restart zrepl

    - name: Enable zrepl service
      ansible.builtin.systemd_service:
        name: zrepl.service
        enabled: true
        state: started

- name: Remove zrepl
  when: zrepl_state == 'absent'
  become: true
  block:
    - name: Disable zrepl service
      ansible.builtin.systemd_service:
        name: zrepl.service
        enabled: false
        state: stopped
      failed_when: false

    - name: Remove zrepl package
      community.general.pacman:
        name: zrepl-git
        state: absent
      failed_when: false
