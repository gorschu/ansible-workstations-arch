---
# Bootstrap playbook - installs prerequisites for main playbook
# Only installs: paru (AUR helper) + 1Password (for vault)
#
# Usage: ansible-playbook bootstrap.yml --ask-become-pass
# For VM: ansible-playbook bootstrap.yml -l arch-test

- name: Bootstrap Ansible prerequisites
  hosts: all
  gather_facts: false

  pre_tasks:
    - name: Update pacman cache
      become: true
      community.general.pacman:
        update_cache: true

  roles:
    - role: aur
      tags: [aur]

  tasks:
    - name: Import 1Password GPG key
      become: true
      become_user: aur_builder
      ansible.builtin.command:
        cmd: gpg --receive-keys 3FEF9748469ADBE15DA7CA80AC2D62742012EA22
      register: bootstrap_1p_gpg
      changed_when: '"imported: 1" in bootstrap_1p_gpg.stderr'

    - name: Install 1Password from AUR
      become: true
      become_user: aur_builder
      kewlfft.aur.aur:
        name:
          - 1password
          - 1password-cli
        state: present

    - name: Bootstrap complete
      ansible.builtin.debug:
        msg: |
          Bootstrap complete!

          Next steps:
          1. Launch 1Password and sign in
          2. Run: ./run-playbook.sh
