---
# Global variables for all hosts
# Role-specific settings (including state toggles) are in role defaults
# Override per-host in host_vars/

# Use system Python to avoid mise shim issues
ansible_python_interpreter: /usr/bin/python3

timezone: Europe/Berlin

# Desktop environment state (set per-host in host_vars/)
gnome_state: absent
kde_state: absent

# Shared Wayland packages (used by hyprland + niri roles)
wayland_common_packages:
  - udiskie
  - pinentry
  - hyprpaper
  - hypridle
  - hyprlock
  - mako
  - cliphist
  - waybar

# Firewalld home zone - trusted LAN subnets and services
networking_firewalld_home_sources:
  - "172.29.50.0/23"
  - "fd6a:7581:f7b::/64"
networking_firewalld_home_services:
  - kdeconnect

# Cloudflare WARP - LAN subnets excluded from tunnel via routing rules
networking_warp_lan_subnets_ipv4:
  - "172.29.50.0/23"
networking_warp_lan_subnets_ipv6:
  - "fd6a:7581:f7b::/64"

# Primary user
primary_user: gorschu
primary_user_comment: "Gordon Schulz"
primary_user_home: /home/{{ primary_user }}
primary_user_uid: 1000
primary_user_groups:
  - wheel
  - video
