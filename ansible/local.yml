---
# Ansible playbook for Arch Linux Workstation setup
#

- name: Configure Arch Linux Workstation
  hosts: all
  gather_facts: true

  # group_vars/all/main.yml and host_vars/ auto-loaded by Ansible
  # vault.yml loaded by roles that need it (networking, resticprofile)

  # Phase tags for new installs (see README.md):
  #   phase1 - base + storage, vault-free, TTY only
  #   phase2 - desktop + 1Password, vault-free (needs phase1 first)
  roles:
    - role: base
      tags: [base, phase1]
    - role: networking
      tags: [networking, tailscale]
    - role: onepassword
      tags: [onepassword, desktop, phase2]
    - role: notebook
      tags: [notebook, power, phase1]
    - role: desktop
      tags: [desktop, gui, ghostty, vscode, beyondcompare, phase2]
    - role: gnome
      tags: [gnome, desktop, phase2]
    - role: kde
      tags: [kde, desktop, phase2]
    - role: multimedia
      tags: [multimedia, codecs, phase2]
    - role: hyprland
      tags: [hyprland, wayland, phase2]
    - role: niri
      tags: [niri, wayland, phase2]
    - role: dms
      tags: [dms, wayland, phase2]
    - role: storage_zfs
      tags: [zfs, zrepl, storage, phase1]
    - role: storage_btrfs
      tags: [storage, btrfs, data, phase1]
    - role: backup_btrbk
      tags: [btrbk, storage, backup, phase1]
    - role: backup_resticprofile
      tags: [resticprofile, backup]
    - role: printing
      tags: [printing, cups]
    - role: virtualization
      tags: [virtualization, incus, docker, podman, containers]
# vim: set ft=yaml.ansible:
