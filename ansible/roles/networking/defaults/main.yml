---
# Networking role defaults

# Networking packages
networking_packages:
  - sshfs
  - networkmanager
  - network-manager-applet
  - wireguard-tools
  - firewalld
  - systemd-resolvconf

# Host to ping for network connectivity checks
networking_connectivity_check_host: "1.1.1.1"

# Interface name patterns for automatic detection
# Wired ethernet interface pattern
networking_wired_interface_pattern: '^en'

# WiFi interface pattern
networking_wifi_interface_pattern: '^wl'

# WireGuard Home VPN configuration
# Set to true to fetch wg-home.conf from 1Password and configure the VPN
networking_wireguard_home_enabled: true

# Cloudflare WARP configuration
networking_warp_state: absent
# Override DNS to Cloudflare's resolvers for the WARP interface (breaks internal DNS, off by default)
networking_warp_cloudflare_dns: false
# LAN subnets to exclude from the WARP tunnel via routing rules (routed via main table instead)
networking_warp_lan_subnets_ipv4: []
networking_warp_lan_subnets_ipv6: []

# Firewalld home zone - trusted LAN subnets and services
networking_firewalld_home_sources: []
networking_firewalld_home_services: []

# Tailscale configuration
networking_tailscale_state: present
# Accept routes from other devices
networking_tailscale_accept_routes: true
# AUR packages for Tailscale GUI (ktailctl requires operator to be set)
networking_tailscale_aur_packages:
  - ktailctl
