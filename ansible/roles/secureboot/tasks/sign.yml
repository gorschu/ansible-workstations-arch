---
# Sign EFI binaries for Secure Boot.
# After initial signing, sbctl's kernel-install plugin (91-sbctl.install)
# and pacman hook (zz-sbctl.hook) handle re-signing on package/kernel updates.

- name: Sign systemd-boot
  ansible.builtin.import_tasks: sign-systemd-boot.yml

- name: Sign fwupd
  ansible.builtin.import_tasks: sign-fwupd.yml

- name: Sign UKIs
  ansible.builtin.import_tasks: sign-ukis.yml
