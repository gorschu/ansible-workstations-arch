---
# Sign and track EFI binaries for Secure Boot.
# After initial signing, the pacman hook and kernel-install plugin handle re-signing.

- name: Sign EFI binaries
  become: true
  block:
    - name: Collect EFI binaries to sign
      ansible.builtin.find:
        paths: /boot/EFI
        patterns: "*.efi"
        recurse: true
      register: _secureboot_efi_files

    - name: Sign and track EFI binaries
      ansible.builtin.command:
        cmd: sbctl sign -s {{ item.path }}
      loop: "{{ _secureboot_efi_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: _secureboot_sign
      changed_when: "'already been signed' not in _secureboot_sign.stdout"
