---
# Sign fwupd's EFI binary at /usr/lib/. fwupd looks for the .signed copy
# next to the original. DisableShimForSecureBoot tells fwupd to use it
# directly instead of going through shim.

- name: Sign and configure fwupd
  become: true
  block:
    - name: Sign fwupd source binary
      ansible.builtin.command:
        cmd: >-
          sbctl sign -s
          -o /usr/lib/fwupd/efi/fwupdx64.efi.signed
          /usr/lib/fwupd/efi/fwupdx64.efi
      register: _secureboot_sign_fwupd
      changed_when: "'already been signed' not in _secureboot_sign_fwupd.stdout"

    - name: Disable fwupd shim usage
      community.general.ini_file:
        path: /etc/fwupd/fwupd.conf
        section: uefi_capsule
        option: DisableShimForSecureBoot
        value: "true"
        mode: "0640"
      notify: Restart fwupd
