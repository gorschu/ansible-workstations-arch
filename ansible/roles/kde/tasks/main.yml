---
# KDE Plasma desktop environment

- name: Install KDE Plasma
  when: kde_state == 'present'
  become: true
  block:
    - name: Install Plasma packages
      community.general.pacman:
        name: "{{ kde_packages }}"
        state: present

    - name: Install KDE applications
      community.general.pacman:
        name: "{{ kde_applications }}"
        state: present

    - name: Enable Plasma Login Manager
      ansible.builtin.systemd_service:
        name: plasmalogin.service
        enabled: true

    - name: Mask gnome-keyring systemd user units globally (KWallet handles org.freedesktop.secrets)
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
      loop:
        - gnome-keyring-daemon.service
        - gnome-keyring-daemon.socket

- name: Remove KDE Plasma
  when: kde_state == 'absent'
  become: true
  block:
    - name: Disable Plasma Login Manager
      ansible.builtin.systemd_service:
        name: plasmalogin.service
        enabled: false
      failed_when: false

    - name: Remove KDE applications
      community.general.pacman:
        name: "{{ kde_applications }}"
        state: absent

    - name: Remove Plasma packages
      community.general.pacman:
        name: "{{ kde_packages }}"
        state: absent

    - name: Unmask gnome-keyring systemd user units globally
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: false
        scope: global
      loop:
        - gnome-keyring-daemon.service
        - gnome-keyring-daemon.socket
      failed_when: false
