---
# DankMaterialShell desktop shell (AUR)

- name: Install DankMaterialShell
  when: dms_state == 'present'
  block:
    - name: Install DankMaterialShell packages
      become: true
      become_user: "{{ primary_user }}"
      environment:
        HOME: "{{ primary_user_home }}"
      ansible.builtin.command:
        cmd: paru -S --noconfirm --needed {{ dms_packages | join(' ') }}
      register: dms_paru_result
      changed_when: >-
        'there is nothing to do' not in
        ((dms_paru_result.stdout | default('')
        ~ dms_paru_result.stderr | default(''))
        | lower)

    - name: Remove mako notification daemon (conflicts via D-Bus activation)
      become: true
      community.general.pacman:
        name: mako
        state: absent

    - name: Deploy DMS systemd user service
      become: true
      ansible.builtin.copy:
        src: dms.service
        dest: /usr/lib/systemd/user/dms.service
        mode: '0644'


- name: Remove DankMaterialShell
  when: dms_state == 'absent'
  block:
    - name: Remove DMS systemd user service
      become: true
      ansible.builtin.file:
        path: /usr/lib/systemd/user/dms.service
        state: absent

    - name: Remove DankMaterialShell packages
      become: true
      become_user: "{{ primary_user }}"
      environment:
        HOME: "{{ primary_user_home }}"
      ansible.builtin.command:
        cmd: paru -Rns --noconfirm {{ dms_packages | join(' ') }}
      register: dms_paru_remove_result
      changed_when: dms_paru_remove_result.rc == 0
      failed_when: false
